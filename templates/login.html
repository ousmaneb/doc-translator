{% extends "base.html" %}
{% block title %}Sign In — DocTranslator{% endblock %}
{% block content %}
<div class="min-h-screen flex items-center justify-center bg-slate-50 px-4 py-12">
  <div class="w-full max-w-sm">

    <div class="flex flex-col items-center mb-8">
      <div class="w-11 h-11 bg-gradient-to-br from-indigo-600 to-violet-600 rounded-xl flex items-center justify-center shadow-lg mb-4">
        <svg class="w-5 h-5 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
          <path stroke-linecap="round" stroke-linejoin="round" d="M3 5h12M9 3v2m1.048 9.5A18.022 18.022 0 016.412 9m6.088 9h7M11 21l5-10 5 10M12.751 5C11.783 10.77 8.07 15.61 3 18.129" />
        </svg>
      </div>
      <h1 class="text-2xl font-bold text-slate-900">Welcome back</h1>
      <p class="text-sm text-slate-500 mt-1">Sign in to your account</p>
    </div>

    <div class="bg-white rounded-2xl border border-slate-200 shadow-sm p-6 sm:p-8">
      <form action="/auth/login" method="post" class="space-y-5">
        <div>
          <label class="block text-sm font-semibold text-slate-700 mb-1.5">Email</label>
          <input type="email" name="email" value="{{ email or '' }}" required autocomplete="email"
            class="w-full px-4 py-3 text-sm border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition-all placeholder:text-slate-400"
            placeholder="you@example.com" />
        </div>
        <div>
          <label class="block text-sm font-semibold text-slate-700 mb-1.5">Password</label>
          <input type="password" name="password" required autocomplete="current-password"
            class="w-full px-4 py-3 text-sm border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition-all placeholder:text-slate-400"
            placeholder="Your password" />
        </div>

        {% if error %}
        <div class="flex items-center gap-2.5 p-3 bg-red-50 border border-red-100 rounded-xl">
          <svg class="w-4 h-4 text-red-500 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
          <p class="text-sm text-red-600">{{ error }}</p>
        </div>
        {% endif %}

        <button type="submit" class="w-full py-3 bg-indigo-600 text-white text-sm font-semibold rounded-xl hover:bg-indigo-500 transition-all shadow-sm">
          Sign in
        </button>
      </form>
    </div>

    <p class="text-center text-sm text-slate-500 mt-6">
      Don't have an account?
      <a href="/signup" class="text-indigo-600 font-semibold hover:text-indigo-500 transition-colors">Get started</a>
    </p>
  </div>
</div>
{% endblock %}
